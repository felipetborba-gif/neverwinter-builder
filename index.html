<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neverwinter DPS Stat Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Forces standard MMO numeric font styling */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8 font-sans selection:bg-cyan-500 selection:text-slate-950">

    <div class="max-w-6xl mx-auto">
        
        <header class="mb-8 border-b border-slate-800 pb-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <div class="flex items-center gap-2">
                    <span class="h-2.5 w-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-xs font-mono tracking-widest text-slate-400 uppercase">Mod 20+ Theorycraft Engine</span>
                </div>
                <h1 class="text-2xl md:text-3xl font-black tracking-wider text-cyan-400 uppercase">DPS Stat Optimizer</h1>
            </div>
            
            <div class="bg-slate-900 border-2 border-cyan-500/30 px-4 py-2.5 rounded-xl flex items-center gap-3 shadow-lg shadow-cyan-950/20">
                <label for="input-il" class="text-xs font-bold uppercase tracking-wider text-slate-300">Item Level:</label>
                <input type="number" id="input-il" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-1 text-amber-400 font-mono font-bold text-xl w-36 text-center focus:outline-none focus:border-cyan-400" value="143887">
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <div class="bg-slate-900/80 border border-slate-800 rounded-2xl p-5 h-fit shadow-xl space-y-6">
                <h2 class="text-xs font-black tracking-widest text-slate-400 uppercase border-b border-slate-800 pb-2.5">Configuração (Modifiers)</h2>

                <div class="space-y-4 text-xs">
                    <div>
                        <label class="block text-slate-300 mb-1.5 font-bold uppercase tracking-wider">Raça (Race)</label>
                        <select id="select-race" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-slate-200 font-medium focus:outline-none focus:border-cyan-500">
                            <option value="Half-Orc" selected>Half-Orc (+5% Crit Severity)</option>
                            <option value="Dragonborn">Dragonborn (+3% Power / +3% Crit Strike)</option>
                            <option value="Metallic Dragonborn">Metallic Dragonborn (+3% Power / +3% Crit Strike)</option>
                            <option value="Human">Human (+1% All Stats)</option>
                            <option value="Aasimar">Aasimar (+2% Power)</option>
                            <option value="None">Nenhuma</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-slate-300 mb-1.5 font-bold uppercase tracking-wider">Comida (Food)</label>
                        <select id="select-food" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-slate-200 font-medium focus:outline-none focus:border-cyan-500">
                            <option value="Squash Soup" selected>Squash Soup (+5% Crit / +5% Severity)</option>
                            <option value="Watermelon">Watermelon Sorbet (+5% Power / +5% Accuracy)</option>
                            <option value="Legacy Watermelon">Legacy Sorbet (+10% Power / +10% Accuracy)</option>
                            <option value="Grand Summer">Grand Summer Feast</option>
                            <option value="Legacy Grand Summer">Legacy Grand Summer Feast</option>
                            <option value="Cha Lua">Cha Lua (+10% Accuracy / +3% Severity)</option>
                            <option value="Hot Wings">Hot Wings (+5% Accuracy / +5% Severity)</option>
                            <option value="None">Nenhuma</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-amber-400 mb-1.5 font-bold uppercase tracking-wider">Stronghold Food (+4,000 Rating)</label>
                        <select id="select-sh" class="w-full bg-slate-950 border border-amber-500/40 rounded-lg p-2.5 text-amber-300 font-bold focus:outline-none focus:border-amber-400">
                            <option value="power" selected>Power Target</option>
                            <option value="accuracy">Accuracy Target</option>
                            <option value="ca">Combat Advantage Target</option>
                            <option value="strike">Critical Strike Target</option>
                            <option value="severity">Critical Severity Target</option>
                            <option value="none">Nenhum</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3 pt-3 border-t border-slate-800">Raid / Party Buffs</label>
                    <div class="space-y-2.5 text-xs font-medium" id="buffs-checkbox-container">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="stat-cards-container" class="grid grid-cols-1 md:grid-cols-2 gap-4.5">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // --- 1. DATABASES & CONSTANTS ---
        const RACES = {
            "Human": { power: 0.01, accuracy: 0.01, ca: 0.01, strike: 0.01, severity: 0.01 },
            "Dragonborn": { power: 0.03, accuracy: 0, ca: 0, strike: 0.03, severity: 0 },
            "Metallic Dragonborn": { power: 0.03, accuracy: 0, ca: 0, strike: 0.03, severity: 0 },
            "Half-Orc": { power: 0, accuracy: 0, ca: 0, strike: 0, severity: 0.05 },
            "Aasimar": { power: 0.02, accuracy: 0, ca: 0, strike: 0, severity: 0 },
            "None": { power: 0, accuracy: 0, ca: 0, strike: 0, severity: 0 }
        };

        const FOODS = {
            "Squash Soup": { power: 0, accuracy: 0, ca: 0, strike: 0.05, severity: 0.05 },
            "Watermelon": { power: 0.05, accuracy: 0.05, ca: 0, strike: 0, severity: 0 },
            "Legacy Watermelon": { power: 0.10, accuracy: 0.10, ca: 0, strike: 0, severity: 0 },
            "Grand Summer": { power: 0.025, accuracy: 0.015, ca: 0, strike: 0.015, severity: 0.025 },
            "Legacy Grand Summer": { power: 0.05, accuracy: 0.05, ca: 0, strike: 0.015, severity: 0.025 },
            "Cha Lua": { power: 0, accuracy: 0.10, ca: 0, strike: 0, severity: 0.03 },
            "Hot Wings": { power: 0, accuracy: 0.05, ca: 0, strike: 0, severity: 0.05 },
            "None": { power: 0, accuracy: 0, ca: 0, strike: 0, severity: 0 }
        };

        const RAID_BUFFS = [
            { id: "porto", label: "Força de Cima (Porto) [+3.5% Pow/CA]", defaultChecked: true, buffs: { power: 0.035, ca: 0.035 } },
            { id: "tutor", label: "Companheiro: Tutor [+5% CA]", defaultChecked: false, buffs: { ca: 0.05 } },
            { id: "flap", label: "Companheiro: Flap [+5% CA]", defaultChecked: false, buffs: { ca: 0.05 } },
            { id: "raptor", label: "Companheiro: Raptor [+18% Power]", defaultChecked: false, buffs: { power: 0.18 } },
            { id: "wildstorm", label: "Elixir Wildstorm [+5% Crit Strike]", defaultChecked: false, buffs: { strike: 0.05 } },
            { id: "sunlord", label: "Elixir Sunlord [+5% Power]", defaultChecked: false, buffs: { power: 0.05 } }
        ];

        const STAT_DEFINITIONS = [
            { key: 'power', name: 'Power', offset: 10000, barTheme: 'from-amber-500 to-orange-600', textTheme: 'text-amber-400', defaultRating: 144306 },
            { key: 'accuracy', name: 'Accuracy', offset: 0, barTheme: 'from-blue-500 to-cyan-600', textTheme: 'text-cyan-400', defaultRating: 142199 },
            { key: 'ca', name: 'Combat Advantage', offset: 10000, barTheme: 'from-purple-500 to-indigo-600', textTheme: 'text-indigo-400', defaultRating: 153045 },
            { key: 'strike', name: 'Critical Strike', offset: 0, barTheme: 'from-emerald-500 to-teal-600', textTheme: 'text-emerald-400', defaultRating: 145504 },
            { key: 'severity', name: 'Critical Severity', offset: 10000, barTheme: 'from-rose-500 to-red-600', textTheme: 'text-rose-400', defaultRating: 154626 }
        ];

        // --- 2. DOM INITIALIZER ---
        function renderInterface() {
            // Put Checkboxes in DOM
            const cbBox = document.getElementById('buffs-checkbox-container');
            cbBox.innerHTML = RAID_BUFFS.map(b => `
                <label class="flex items-center gap-2.5 p-1.5 rounded-lg hover:bg-slate-800/60 cursor-pointer transition-colors">
                    <input type="checkbox" id="buff-${b.id}" class="buff-toggle h-4 w-4 rounded border-slate-700 bg-slate-950 text-cyan-500 focus:ring-0" ${b.defaultChecked ? 'checked' : ''}>
                    <span class="text-slate-300 select-none">${b.label}</span>
                </label>
            `).join('');

            // Put 5 Stat Cards in DOM
            const cardBox = document.getElementById('stat-cards-container');
            cardBox.innerHTML = STAT_DEFINITIONS.map(s => `
                <div class="bg-slate-900/90 border border-slate-800 rounded-2xl p-4.5 shadow-lg flex flex-col justify-between relative overflow-hidden">
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <span class="text-[10px] font-mono font-bold tracking-widest ${s.textTheme} uppercase">${s.offset > 0 ? 'Primary (+10k)' : 'Secondary (+0)'}</span>
                                <h3 class="text-lg font-black text-white tracking-wide">${s.name}</h3>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black ${s.textTheme}" id="pct-${s.key}">0.00%</div>
                                <div class="text-xs font-mono text-slate-500">Cap: <span id="cap-${s.key}">0</span></div>
                            </div>
                        </div>

                        <div class="mb-3.5">
                            <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-1">Current Rating</label>
                            <input type="number" id="rating-${s.key}" class="stat-input w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-slate-100 font-mono font-bold text-sm focus:outline-none focus:border-cyan-400 transition-colors" value="${s.defaultRating}">
                        </div>

                        <div class="w-full bg-slate-950 h-2.5 rounded-full overflow-hidden mb-3 p-0.5 border border-slate-800/80">
                            <div id="bar-${s.key}" class="bg-gradient-to-r ${s.barTheme} h-full rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between text-xs font-mono text-slate-400 pt-2.5 border-t border-slate-800/80">
                            <div>Rating: <span class="text-slate-200" id="breakdown-${s.key}-rating">0.0%</span></div>
                            <div>Buffs: <span class="text-slate-200" id="breakdown-${s.key}-buffs">+0.0%</span></div>
                        </div>

                        <div id="waste-${s.key}" class="mt-2.5 text-xs font-mono font-semibold text-rose-400 bg-rose-950/40 border border-rose-900/50 rounded-lg px-2.5 py-1 flex items-center justify-between hidden">
                            <span>⚠️ Over Rating Cap:</span>
                            <span id="waste-val-${s.key}">0</span>
                        </div>
                    </div>
                </div>
            `).join('');

            // Bind reactive listeners to ALL inputs
            document.querySelectorAll('input, select').forEach(element => {
                element.addEventListener('input', runEngine);
                element.addEventListener('change', runEngine);
            });

            runEngine(); // Fire calculation 1 immediately
        }

        // --- 3. REATIVE MATH ENGINE ---
        function runEngine() {
            const itemLevel = parseInt(document.getElementById('input-il').value) || 0;
            const raceKey = document.getElementById('select-race').value;
            const foodKey = document.getElementById('select-food').value;
            const shTarget = document.getElementById('select-sh').value;

            // Tally checked Raid Buffs
            const activeRaidBuffs = {};
            RAID_BUFFS.forEach(buffObj => {
                const isON = document.getElementById(`buff-${buffObj.id}`).checked;
                if (isON) {
                    Object.keys(buffObj.buffs).forEach(stat => {
                        activeRaidBuffs[stat] = (activeRaidBuffs[stat] || 0) + buffObj.buffs[stat];
                    });
                }
            });

            // Calculate each stat independently
            STAT_DEFINITIONS.forEach(stat => {
                const userRating = parseInt(document.getElementById(`rating-${stat.key}`).value) || 0;
                
                // 1. Target Cap
                const targetCap = itemLevel + stat.offset;
                document.getElementById(`cap-${stat.key}`).innerText = targetCap.toLocaleString();

                // 2. Stronghold Injection
                const shBonus = (shTarget === stat.key) ? 4000 : 0;
                const effectiveRating = userRating + shBonus;

                // 3. Rating Ratio (Strict 50% clamp)
                const rawRatio = targetCap > 0 ? (effectiveRating / targetCap) * 0.50 : 0;
                const clampedRatio = Math.min(0.50, rawRatio);

                // 4. Flat % Buff Summation
                const rBuff = (RACES[raceKey] && RACES[raceKey][stat.key]) ? RACES[raceKey][stat.key] : 0;
                const fBuff = (FOODS[foodKey] && FOODS[foodKey][stat.key]) ? FOODS[foodKey][stat.key] : 0;
                const partyBuff = activeRaidBuffs[stat.key] || 0;
                
                const totalBuffsDecimal = rBuff + fBuff + partyBuff;

                // 5. Final % Assembly (Strict 90% Hard Cap)
                const finalDecimal = clampedRatio + totalBuffsDecimal;
                const finalPct = Math.min(0.90, finalDecimal) * 100;

                // 6. Waste Math
                const excessRating = Math.max(0, effectiveRating - targetCap);

                // Push values to screen
                document.getElementById(`pct-${stat.key}`).innerText = finalPct.toFixed(2) + '%';
                document.getElementById(`breakdown-${stat.key}-rating`).innerText = (clampedRatio * 100).toFixed(2) + '%';
                document.getElementById(`breakdown-${stat.key}-buffs`).innerText = '+' + (totalBuffsDecimal * 100).toFixed(2) + '%';

                // Scale bar relative to 90% hard cap
                const visualWidth = Math.min(100, (finalPct / 90) * 100);
                document.getElementById(`bar-${stat.key}`).style.width = visualWidth + '%';

                // Trigger waste warning DOM
                const wastePill = document.getElementById(`waste-${stat.key}`);
                if (excessRating > 0) {
                    wastePill.classList.remove('hidden');
                    document.getElementById(`waste-val-${stat.key}`).innerText = '+' + excessRating.toLocaleString();
                } else {
                    wastePill.classList.add('hidden');
                }
            });
        }

        window.addEventListener('DOMContentLoaded', renderInterface);
    </script>
</body>
</html>
