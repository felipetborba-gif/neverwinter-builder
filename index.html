<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full DPS Optimizer</title>

<style>
body { font-family: Arial; background:#0d0d0d; color:#eee; padding:20px;}
h1{color:#00ff88}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.card{background:#1a1a1a;padding:15px;border-radius:8px}
input,select{width:100%;padding:6px;margin-top:5px;background:#222;color:#fff;border:1px solid #444}
button{padding:12px;background:#00ff88;border:none;width:100%;cursor:pointer;margin-top:10px}
.result{font-size:16px;margin-top:10px}
</style>
</head>

<body>

<h1>Full DPS Optimization Tool</h1>

<div class="grid">

<div class="card">
<h3>Base Stats</h3>
Power <input id="power" value="144306">
Accuracy <input id="accuracy" value="142199">
CA <input id="ca" value="153045">
Strike <input id="strike" value="145504">
Severity <input id="severity" value="154626">
</div>

<div class="card">
<h3>Race</h3>
<select id="race">
<option value="human">Human</option>
<option value="dragonborn">Dragonborn</option>
<option value="metallic">Metallic Dragonborn</option>
<option value="halfOrc">Half-Orc</option>
<option value="aasimar">Aasimar</option>
<option value="gith">Gith</option>
<option value="woodElf">Wood Elf</option>
</select>

<h3>Class</h3>
<select id="class">
<option value="bard">Bard</option>
<option value="cw">CW</option>
<option value="dc">DC</option>
<option value="gf">GF</option>
<option value="gwf">GWF</option>
<option value="hr">HR</option>
<option value="sw">SW</option>
<option value="tr">TR</option>
</select>

<h3>Companion</h3>
<select id="comp">
<option value="raptor">Raptor (18% Power)</option>
<option value="none">None</option>
</select>
</div>

<div class="card">
<h3>Food / Consumables</h3>
<label><input type="checkbox" class="buff" data="0.1,0.1,0,0,0"> Wildstorm</label>
<label><input type="checkbox" class="buff" data="0.05,0.05,0,0,0"> Watermelon</label>
<label><input type="checkbox" class="buff" data="0.025,0.015,0,0.015,0.025"> Grand Summer</label>
<label><input type="checkbox" class="buff" data="0,0,0,0.05,0.05"> Squash Soup</label>
<label><input type="checkbox" class="buff" data="0,0.1,0,0,0.03"> Cha Lua</label>
<label><input type="checkbox" class="buff" data="0,0.05,0,0,0.05"> Hot Wings</label>

<h3>Potions</h3>
<label><input type="checkbox" class="buff" data="0,0,0,0.05,0.05"> Elixir</label>
<label><input type="checkbox" class="buff" data="0,0,0,0,0"> Flask</label>
</div>

<div class="card">
<h3>Gear Bonuses</h3>
<label><input type="checkbox" class="buff" data="0.06,0.06,0,0,0" checked> Armor</label>
<label><input type="checkbox" class="buff" data="0.108,0.108,0,0,0" checked> Enchant</label>
